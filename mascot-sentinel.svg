<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
<defs>
  <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8B6FFF"/><stop offset="1" stop-color="#6D4AE8"/></linearGradient>
  <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a1440"/><stop offset="1" stop-color="#0f0b28"/></linearGradient>
  <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34D399"/><stop offset="1" stop-color="#22D3EE"/></linearGradient>
  <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#F0ABFC" stop-opacity="0.9"/><stop offset="1" stop-color="#F0ABFC" stop-opacity="0"/></radialGradient>
  <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="dropg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<!-- ground shadow -->
<ellipse cx="150" cy="316" rx="86" ry="16" fill="#000" opacity="0.35"/>

<!-- little legs -->
<g fill="#5B3FD0"><rect x="112" y="278" width="26" height="34" rx="13"/><rect x="162" y="278" width="26" height="34" rx="13"/></g>
<g fill="#34D399"><ellipse cx="125" cy="312" rx="18" ry="9"/><ellipse cx="175" cy="312" rx="18" ry="9"/></g>

<!-- antenna with brain-spark -->
<line x1="150" y1="60" x2="150" y2="34" stroke="#7C5CFF" stroke-width="4" stroke-linecap="round"/>
<circle cx="150" cy="28" r="9" fill="#22D3EE" filter="url(#dropg)"/>
<circle cx="150" cy="28" r="4" fill="#ECFEFF"/>

<!-- BODY rounded -->
<rect x="72" y="70" width="156" height="180" rx="62" fill="url(#body)"/>
<rect x="72" y="70" width="156" height="180" rx="62" fill="none" stroke="#B8A5FF" stroke-width="2" opacity="0.5"/>

<!-- belly screen with brain lobes (WEVIA DNA) -->
<rect x="98" y="150" width="104" height="78" rx="26" fill="url(#belly)" stroke="#3A2E70" stroke-width="2"/>
<!-- two-lobe brain motif -->
<path d="M150,168 C146,164 139,163 134,166 C129,169 127,174 128,179 C125,181 124,186 127,190 C130,194 136,194 139,191 C141,195 145,197 150,197" fill="none" stroke="#A78BFA" stroke-width="3" stroke-linecap="round" filter="url(#soft)"/>
<path d="M150,168 C154,164 161,163 166,166 C171,169 173,174 172,179 C175,181 176,186 173,190 C170,194 164,194 161,191 C159,195 155,197 150,197" fill="none" stroke="#67E8F9" stroke-width="3" stroke-linecap="round" filter="url(#soft)"/>

<!-- FACE -->
<!-- big friendly eyes -->
<g>
  <ellipse cx="120" cy="120" rx="22" ry="24" fill="#0d0a24"/>
  <ellipse cx="180" cy="120" rx="22" ry="24" fill="#0d0a24"/>
  <circle cx="126" cy="114" r="8" fill="#22D3EE"/><circle cx="129" cy="111" r="3" fill="#fff"/>
  <circle cx="186" cy="114" r="8" fill="#22D3EE"/><circle cx="189" cy="111" r="3" fill="#fff"/>
</g>
<!-- cheeks -->
<circle cx="98" cy="140" r="14" fill="url(#cheek)"/>
<circle cx="202" cy="140" r="14" fill="url(#cheek)"/>
<!-- tiny smile -->
<path d="M138,142 Q150,152 162,142" fill="none" stroke="#0d0a24" stroke-width="3.5" stroke-linecap="round"/>

<!-- ARM holding shield -->
<path d="M78,180 Q40,190 44,224" fill="none" stroke="url(#body)" stroke-width="20" stroke-linecap="round"/>
<!-- SHIELD (the guard identity) -->
<g transform="translate(44,236)">
  <path d="M0,-34 L30,-18 L30,16 L0,36 L-30,16 L-30,-18 Z" fill="url(#shield)" filter="url(#dropg)"/>
  <path d="M0,-34 L30,-18 L30,16 L0,36 L-30,16 L-30,-18 Z" fill="none" stroke="#ECFDF5" stroke-width="2" opacity="0.8"/>
  <path d="M-14,2 L-3,14 L15,-12" fill="none" stroke="#0d2a24" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<!-- other arm -->
<path d="M222,180 Q250,192 244,214" fill="none" stroke="url(#body)" stroke-width="20" stroke-linecap="round"/>
<circle cx="244" cy="216" r="12" fill="#34D399"/>
</svg>
