<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
<defs>
  <radialGradient id="amb" cx="0.28" cy="0.48" r="0.68">
    <stop offset="0" stop-color="#241452"/><stop offset="0.42" stop-color="#0c0a24"/><stop offset="1" stop-color="#030409"/>
  </radialGradient>
  <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#C4A6FF"/><stop offset="0.5" stop-color="#7C5CFF"/><stop offset="1" stop-color="#22D3EE"/>
  </linearGradient>
  <linearGradient id="txtg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FFFFFF"/><stop offset="0.62" stop-color="#F2EEFF"/><stop offset="1" stop-color="#B69CFF"/>
  </linearGradient>
  <filter id="bL" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="30"/></filter>
