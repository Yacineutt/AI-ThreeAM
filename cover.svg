<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1f"/><stop offset="0.55" stop-color="#0d1330"/><stop offset="1" stop-color="#131a3a"/>
    </linearGradient>
    <linearGradient id="gw" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7C5CFF"/><stop offset="1" stop-color="#1FB6FF"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5"><stop offset="0" stop-color="#7C5CFF" stop-opacity="0.32"/><stop offset="1" stop-color="#7C5CFF" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/></pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <ellipse cx="470" cy="300" rx="360" ry="260" fill="url(#glow)"/>

  <!-- shield hexagon lattice -->
  <g transform="translate(470,300)">
    <g fill="none" stroke="url(#gw)" stroke-opacity="0.85">
      <path d="M0,-150 L130,-75 L130,75 L0,150 L-130,75 L-130,-75 Z" stroke-width="2.5"/>
      <path d="M0,-96 L83,-48 L83,48 L0,96 L-83,48 L-83,-48 Z" stroke-width="1.6" stroke-opacity="0.55"/>
    </g>
    <!-- inner hex cells -->
    <g fill="#7C5CFF" fill-opacity="0.10" stroke="#1FB6FF" stroke-opacity="0.4" stroke-width="1">
      <path d="M0,-52 L45,-26 L45,26 L0,52 L-45,26 L-45,-26 Z"/>
    </g>
    <!-- checkmark core -->
    <path d="M-26,4 L-6,26 L34,-22" fill="none" stroke="#37E0A6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>
    <path d="M-26,4 L-6,26 L34,-22" fill="none" stroke="#37E0A6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle r="185" fill="none" stroke="#7C5CFF" stroke-opacity="0.25" stroke-width="1"/>
  </g>

  <!-- data streams flowing into shield -->
  <g stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M60,120 C220,180 300,240 335,270" stroke="#1FB6FF" stroke-dasharray="5 8"/>
    <path d="M60,520 C220,460 300,380 335,340" stroke="#1FB6FF" stroke-dasharray="5 8"/>
    <path d="M80,320 C180,320 260,300 320,300" stroke="#37E0A6" stroke-dasharray="5 8"/>
  </g>
  <g fill="#1FB6FF"><circle cx="335" cy="270" r="3"/><circle cx="335" cy="340" r="3"/></g>

  <!-- text -->
  <text x="770" y="270" fill="#EAF0FF" font-size="62" font-weight="800" letter-spacing="-1">Agent Ops</text>
  <text x="770" y="342" fill="#EAF0FF" font-size="62" font-weight="800" letter-spacing="-1">Doctrines</text>
  <rect x="772" y="372" width="120" height="4" rx="2" fill="url(#gw)"/>
  <text x="772" y="412" fill="#9FB0D8" font-size="22" font-weight="400">Discipline for AI agents that touch production.</text>
  <text x="772" y="474" fill="#5D6B92" font-size="17" font-family="'IBM Plex Mono',monospace">by Yacine Mahboub · Founder of WEVIA</text>
</svg>
